name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn package -B

      - name: Get tag name
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "BrushSpeed ${{ steps.tag.outputs.TAG }}"
          body: |
            ## Download
            Drop **BrushSpeed-*.jar** into your server's `plugins/` folder and restart.

            ## Requirements
            - Paper 1.20.4+
            - Java 21+
          files: target/BrushSpeed-*.jar
