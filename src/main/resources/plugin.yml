name: BrushSpeed
version: ${project.version}
main: com.brushspeed.BrushSpeedPlugin
api-version: '1.21'
description: Change the speed of brushing suspicious sand and gravel blocks
author: BrushSpeed
website: https://github.com/tiagoferreira/BrushSpeed

commands:
  brushspeed:
    description: Manage brush speed settings
    usage: /brushspeed [enchant <speed>|disenchant|set <speed> [player]|setall <speed>|reset|resetall|reload]
    aliases: [bs, bspeed]
    permission: brushspeed.use

permissions:
  brushspeed.use:
    description: Allows using the /brushspeed command to view own speed
    default: op
  brushspeed.set:
    description: Allows setting your own brush speed
    default: op
  brushspeed.set.others:
    description: Allows setting other players' brush speed
    default: op
  brushspeed.enchant:
    description: Allows applying/removing brush speed from a specific brush item
    default: op
  brushspeed.setall:
    description: Allows setting brush speed for all players at once
    default: op
  brushspeed.reload:
    description: Allows reloading the plugin config
    default: op
